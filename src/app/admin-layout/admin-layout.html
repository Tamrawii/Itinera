<main class="admin-shell">
  <aside
    class="flex min-h-screen w-full flex-col border-r border-slate-200 bg-slate-100 px-4 py-5 text-slate-700"
    aria-label="Admin sidebar"
  >
    <div class="mb-5 flex items-center gap-3 px-2">
      <img src="/images/logo.png" alt="Itinera logo" class="h-10 w-10 rounded-xl object-contain" />
      <div>
        <p class="text-lg font-bold text-slate-800">Itinera</p>
        <p class="text-xs text-slate-500">Admin Portal</p>
      </div>
    </div>

    <p class="mb-3 px-2 text-xs font-semibold uppercase tracking-wide text-slate-400">Menu</p>
    <nav class="space-y-1">
      <a
        routerLink="/admin/overview"
        routerLinkActive="sidebar-active"
        [routerLinkActiveOptions]="{ exact: true }"
        [state]="{ nbServices: offersList().length }"
        class="sidebar-link"
      >
        <span class="sidebar-icon">
          <lineicons [icon]="barChart4Outlined" [size]="22" [strokeWidth]="1.5"></lineicons>
        </span>
        Overview
      </a>

      <a routerLink="/admin/services" routerLinkActive="sidebar-active" class="sidebar-link">
        <span class="sidebar-icon">
          <lineicons [icon]="boxClosedOutlined" [size]="22" [strokeWidth]="1.5"></lineicons>
        </span>
        Services
      </a>

      <a routerLink="/admin/providers" routerLinkActive="sidebar-active" class="sidebar-link">
        <span class="sidebar-icon">
          <lineicons [icon]="user4Outlined" [size]="22" [strokeWidth]="1.5"></lineicons>
        </span>
        Providers
      </a>

      <a routerLink="/admin/users" routerLinkActive="sidebar-active" class="sidebar-link">
        <span class="sidebar-icon">
          <lineicons [icon]="userMultiple4Outlined" [size]="22" [strokeWidth]="1.5"></lineicons>
        </span>
        Users
      </a>

      <a routerLink="/admin/bookings" routerLinkActive="sidebar-active" class="sidebar-link">
        <span class="sidebar-icon">
          <lineicons [icon]="calendarDaysOutlined" [size]="22" [strokeWidth]="1.5"></lineicons>
        </span>
        Bookings
      </a>
    </nav>

    <p class="mb-3 mt-6 px-2 text-xs font-semibold uppercase tracking-wide text-slate-400">
      Account
    </p>
    <a routerLink="/admin/settings" routerLinkActive="sidebar-active" class="sidebar-link">
      <span class="sidebar-icon">
        <lineicons [icon]="gear1Outlined" [size]="22" [strokeWidth]="1.5"></lineicons>
      </span>
      Settings
    </a>

    <a
      routerLink="/"
      class="mt-auto inline-flex items-center gap-2 px-2 py-3 text-sm font-medium text-slate-500 transition hover:text-blue-600"
    >
      <svg class="h-4 w-4" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <path d="M8.5 5 4 9.5 8.5 14M4.5 9.5h11" stroke="currentColor" stroke-width="1.7" />
      </svg>
      Back to site
    </a>
  </aside>

  <div class="admin-main">
    <header
      class="sticky top-0 z-20 flex items-center justify-between border-b border-slate-200 bg-white px-6 py-4"
    >
      <p class="font-semibold text-gray-500">Admin Dashboard</p>

      <div class="flex items-center gap-4">
        <button
          type="button"
          class="rounded-full border border-slate-200 p-2.5 text-slate-500 transition hover:text-blue-600"
          aria-label="Notifications"
        >
          <svg class="h-4 w-4" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path
              d="M10 3a4 4 0 0 0-4 4v1.7c0 .59-.19 1.17-.54 1.65L4.4 11.8a1 1 0 0 0 .8 1.6h9.6a1 1 0 0 0 .8-1.6l-1.05-1.46A2.8 2.8 0 0 1 14 8.7V7a4 4 0 0 0-4-4Z"
              stroke="currentColor"
              stroke-width="1.5"
            />
            <path d="M8.5 15a1.5 1.5 0 0 0 3 0" stroke="currentColor" stroke-width="1.5" />
          </svg>
        </button>
        <span
          class="inline-flex h-8 w-8 items-center justify-center rounded-full bg-blue-100 text-xs font-bold text-blue-700"
          >BC</span
        >
      </div>
    </header>
    <div class="p-6">
      <router-outlet></router-outlet>
    </div>
  </div>
</main>
