<app-navbar></app-navbar>

<main class="view-all-page margin-top">
  <section class="hero-panel px-24 py-12">
    <div class="max-w-[1360px] mx-auto">
      <h1 class="text-5xl font-bold text-slate-800 mb-2">Explore Services</h1>
      <p class="text-slate-600 text-xl mb-8">Find hotels, restaurants, tours, and more across Tunisia</p>

      <div class="flex items-center gap-3 max-w-[760px]">
        <div class="search-wrap flex items-center gap-3 bg-white rounded-2xl px-5 py-3 w-full">
          <lineicons [icon]="Search1Outlined" [size]="18"></lineicons>
          <input
            type="text"
            class="w-full text-lg placeholder:text-slate-400 focus:outline-none"
            placeholder="Search by name or location..."
          />
        </div>

        <button type="button" class="filter-btn inline-flex items-center gap-2 rounded-2xl px-5 py-3">
          <svg viewBox="0 0 24 24" fill="none" class="w-5 h-5">
            <path d="M4 7h16M7 12h10M10 17h4" stroke="currentColor" stroke-width="2" />
          </svg>
          Filters
        </button>
      </div>
    </div>
  </section>

  <section class="results-panel px-24 py-10">
    <div class="max-w-[1360px] mx-auto">
      <div class="flex items-center gap-3 flex-wrap mb-8">
        <button type="button" class="chip chip-active">All</button>
        <button type="button" class="chip">Hotels</button>
        <button type="button" class="chip">Restaurants</button>
        <button type="button" class="chip">Tours</button>
        <button type="button" class="chip">Transport</button>
      </div>

      <p class="text-slate-500 text-xl mb-8">{{ featuredList.length }} results found</p>

      <div class="grid grid-cols-3 gap-6 pb-6">
        @for (item of featuredList; track item.title) {
          <app-featured-card
            [item]="item"
            [showActions]="false"
            [showFavorite]="true"
            [showCategory]="true"
          ></app-featured-card>
        }
      </div>
    </div>
  </section>
</main>

<app-footer></app-footer>
