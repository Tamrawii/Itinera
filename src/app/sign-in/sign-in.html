<main class="sign-in-page">
  <div class="sign-in-container">
    <div class="sign-in-card">
      <header class="sign-in-header text-center">
        <img src="/images/logo.png" alt="Itinera Logo" class="h-16 mx-auto mb-4" />
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Welcome back!</h1>
        <p class="text-base text-gray-600">Sign in to access your itineraries and bookings</p>
      </header>

      <div class="social-actions grid grid-cols-2 gap-3 mt-8">
        <button
          type="button"
          (click)="signInWithOAuth('google')"
          class="inline-flex items-center justify-center gap-2 text-gray-700 bg-white hover:bg-gray-50 border border-gray-300 focus:ring-4 focus:ring-gray-100 font-medium rounded-lg text-sm px-5 py-3 focus:outline-none transition-all cursor-pointer"
        >
          <lineicons [icon]="GoogleOutlined" [size]="20" [strokeWidth]="1.8"></lineicons>
          <span>Google</span>
        </button>
        <button
          type="button"
          (click)="signInWithOAuth('facebook')"
          class="inline-flex items-center justify-center gap-2 text-gray-700 bg-white hover:bg-gray-50 border border-gray-300 focus:ring-4 focus:ring-gray-100 font-medium rounded-lg text-sm px-5 py-3 focus:outline-none transition-all cursor-pointer"
        >
          <lineicons [icon]="AppleBrandOutlined" [size]="20" [strokeWidth]="1.8"></lineicons>
          <span>Facebook</span>
        </button>
      </div>

      <div class="divider my-6">
        <span class="text-sm text-gray-500">or continue with email</span>
      </div>

      <form class="sign-in-form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
          <div class="relative">
            <div
              class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-gray-500"
            >
              <lineicons [icon]="Envelope1Outlined" [size]="20" [strokeWidth]="1.8"></lineicons>
            </div>
            <input
              type="email"
              id="email"
              name="email"
              [(ngModel)]="credentials.email"
              class="block w-full pl-11 pr-4 py-3 text-gray-900 border border-gray-300 rounded-lg bg-white focus:ring-4 focus:ring-blue-100 focus:border-blue-500 placeholder-gray-400 text-sm focus:outline-none transition-all"
              placeholder="you@example.com"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label for="password" class="block text-sm font-semibold text-gray-700 mb-2"
            >Password</label
          >
          <div class="relative">
            <div
              class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-gray-500"
            >
              <lineicons [icon]="Locked1Outlined" [size]="20" [strokeWidth]="1.8"></lineicons>
            </div>
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              name="password"
              [(ngModel)]="credentials.password"
              class="block w-full pl-11 pr-12 py-3 text-gray-900 border border-gray-300 rounded-lg bg-white focus:ring-4 focus:ring-blue-100 focus:border-blue-500 placeholder-gray-400 text-sm focus:outline-none transition-all"
              placeholder="••••••••"
              required
            />
            <button
              type="button"
              (click)="togglePasswordVisibility()"
              class="absolute inset-y-0 right-0 flex items-center pr-3.5 text-gray-500 hover:text-gray-700 transition-colors cursor-pointer"
              [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
            >
              <lineicons
                [icon]="showPassword ? EyeSolid : EyeOutlined"
                [size]="20"
                [strokeWidth]="1.8"
              ></lineicons>
            </button>
          </div>
        </div>

        <button
          type="submit"
          [disabled]="isLoading"
          class="w-full text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-200 font-semibold rounded-lg text-base px-5 py-3.5 focus:outline-none transition-all mt-2 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <span *ngIf="isLoading" class="inline-flex items-center">
            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Signing in...
          </span>
          <span *ngIf="!isLoading">Sign In</span>
        </button>
      </form>

      <p class="sign-in-footer text-center text-sm text-gray-600 mt-6">
        Don't have an account?
        <a
          href="#"
          class="font-semibold text-blue-600 hover:text-blue-700 ml-1"
          routerLink="/sign-up"
          >Sign up</a
        >
      </p>
    </div>
  </div>
</main>
